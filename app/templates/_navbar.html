

{% set nav_country = country if country is defined and country else 'us' %}
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom navbar-compact rounded my-1 mb-2">
  <div class="container-fluid d-flex align-items-center">

    <!-- Country Dropdown -->
    <div class="dropdown me-3">
      <button class="btn btn-secondary btn-sm dropdown-toggle" type="button" id="countryDropdown"
              data-bs-toggle="dropdown" aria-expanded="false">
        {{ country_flags.get(nav_country) }}
        {{ nav_country.upper() }}
      </button>

      <ul class="dropdown-menu" aria-labelledby="countryDropdown">
        
        {% for code, flag in country_flags.items() %}
          
            <li>
              <a class="dropdown-item" href="{{ switch_country_url(code) }}">
                {{ flag }} {{ code.upper() }}
              </a>
            </li>
          
        {% endfor %}
      </ul>
    </div>

    <!-- Brand 
    <a class="navbar-brand fw-semibold me-3" href="{{ url_for('main.index') }}">
      ThinkPad Prices
    </a>-->
    
    <img src="{{ url_for('static', filename='favicon-32x32.png') }}" alt="favicon">

    <!-- Mobile toggler -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNavbar"
            aria-controls="siteNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Links -->
    <div class="collapse navbar-collapse" id="siteNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
             href="{{ url_for('main.country_home', country=country) }}">
            Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.deals' %}active{% endif %}"
             href="{{ url_for('main.deals', country=nav_country) }}">
            Market Overview
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.best_deals' %}active{% endif %}"
             href="{{ url_for('main.best_deals', country=nav_country) }}">
            Best Deals
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.price_drops' %}active{% endif %}"
             href="{{ url_for('main.price_drops', country=nav_country) }}">
            Price Drops
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.thinkpad_models' %}active{% endif %}"
             href="{{ url_for('main.thinkpad_models', country=nav_country) }}">
            Available Models
          </a>
        </li>

      </ul>
    </div>
    <form class="d-flex ms-auto" method="get" action="{{ url_for('main.search_model') }}">
        <input
            class="form-control me-2"
            type="search"
            name="q"
            placeholder="Search model (e.g. T480)"
            aria-label="Search model"
            required
        >
        <!-- Pass the currently selected country -->
        <input type="hidden" name="country" value="{{ country }}">
        <button class="btn btn-outline-light" type="submit">Search</button>
    </form>

  </div>
</nav>
