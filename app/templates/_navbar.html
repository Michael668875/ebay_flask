{% set nav_country = country if country is defined and country else 'us' %}

<nav class="navbar bg-body-tertiary border-bottom navbar-compact rounded my-1 mb-2">
  <div class="container-fluid d-flex align-items-center gap-2">

    <!-- Left side: country + favicon -->
    <div class="d-flex align-items-center gap-2 flex-shrink-0">
      <!-- Country Dropdown -->
      <div class="dropdown">
        <button class="btn btn-secondary btn-sm dropdown-toggle" type="button" id="countryDropdown"
                data-bs-toggle="dropdown" aria-expanded="false">
          {{ country_flags.get(nav_country) }}
          {{ nav_country.upper() }}
        </button>

        <ul class="dropdown-menu" aria-labelledby="countryDropdown">
          {% for code, flag in country_flags.items() %}
            <li>
              <a class="dropdown-item" href="{{ switch_country_url(code) }}">
                {{ flag }} {{ code.upper() }}
              </a>
            </li>
          {% endfor %}
        </ul>
      </div>

      <!-- Favicon / brand icon -->
      <a href="{{ url_for('main.country_home', country=nav_country) }}" class="d-inline-flex align-items-center text-decoration-none">
        <img src="{{ url_for('static', filename='img/favicon-32x32.png') }}" alt="ThinkPad Prices" width="24" height="24">
      </a>
    </div>

    <!-- Desktop links only -->
    <div class="d-flex gap-2">
    <div class="d-none d-md-flex align-items-center">
      <ul class="navbar-nav flex-row gap-2 me-3">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.country_home' %}active{% endif %}"
             href="{{ url_for('main.country_home', country=nav_country) }}">
            <button class="btn btn-outline-secondary btn-sm top-menu-btn" type="button">Home</button>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.deals' %}active{% endif %}"
             href="{{ url_for('main.deals', country=nav_country) }}">
            <button class="btn btn-outline-secondary btn-sm top-menu-btn" type="button">Market Overview</button>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.best_deals' %}active{% endif %}"
             href="{{ url_for('main.best_deals', country=nav_country) }}">
            <button class="btn btn-outline-secondary btn-sm top-menu-btn" type="button">Best Deals</button>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.price_drops' %}active{% endif %}"
             href="{{ url_for('main.price_drops', country=nav_country) }}">
            <button class="btn btn-outline-secondary btn-sm top-menu-btn" type="button">Price Drops</button>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'main.thinkpad_models' %}active{% endif %}"
             href="{{ url_for('main.thinkpad_models', country=nav_country) }}">
            <button class="btn btn-outline-secondary btn-sm top-menu-btn" type="button">Available Models</button>
          </a>
        </li>
      </ul>
    </div>
    </div>

    <!-- Search bar: always visible -->
    <div class="search-wrap ms-auto">
      <form class="d-flex" method="get" action="{{ url_for('main.search_model') }}">
        <input
          class="form-control me-2"
          type="search"
          name="q"
          placeholder="Search model"
          aria-label="Search model"
          required
        >
        <input type="hidden" name="country" value="{{ nav_country }}">
        <button class="btn btn-outline-light flex-shrink-0" type="submit">Search</button>
      </form>
    </div>

  </div>
</nav>
